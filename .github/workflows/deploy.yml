name: Build & Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build server
        run: cd apps/server && npm run build

      - name: Build ws
        run: cd apps/ws && npm run build

      - name: Build poller
        run: cd apps/poller && npm run build

      - name: Build web
        run: cd apps/web && NODE_OPTIONS="--max-old-space-size=1024" npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/exness

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Installing dependencies..."
            pnpm install

            echo "Building services..."
            cd apps/server && npm run build && cd ../..
            cd apps/ws    && npm run build && cd ../..
            cd apps/poller && npm run build && cd ../..
            cd apps/web && NODE_OPTIONS="--max-old-space-size=1024" npm run build && cd ../..

            echo "Restarting services..."
            pm2 restart all
            pm2 save

            echo "Deploy complete!"
            pm2 status
